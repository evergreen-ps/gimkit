<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Gimkit Hacks</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0f14;
      font-family: system-ui, sans-serif;
    }
    .rect-btn {
      width: 180px;
      height: 60px;
      display: grid;
      place-items: center;
      border: 2px solid transparent;
      background:
        linear-gradient(#0b0f14, #0b0f14) padding-box,
        linear-gradient(135deg, #00e5ff, #ff00cc) border-box;
      color: #e6f1ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 12px 45px -10px rgba(0,229,255,0.35);
    }
    .rect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(0,229,255,0.20),
                  0 12px 55px -10px rgba(0,229,255,0.45);
    }
  </style>
</head>
<body>
  <button class="rect-btn" id="launch">Cloaked Gimkit Hacks</button>

  <script>
    // 🔗 New game link
    const sandboxLink = "https://gim.villainsrule.xyz/join/";

    // Extract a readable name from the link
    const gameName = sandboxLink.split("/").filter(Boolean).pop().replace(/[-_]/g, " ");

    document.getElementById('launch').addEventListener('click', () => {
      const win = window.open('about:blank', '_blank');
      win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>${gameName}</title>
          <style>
            html, body {
              margin: 0;
              height: 100%;
              overflow: hidden;
              background: #000;
            }
            iframe {
              border: none;
              width: 100%;
              height: 100%;
            }
          </style>
        </head>
        <body>
          <iframe src="${sandboxLink}"
                  allow="fullscreen; gamepad; pointer-lock"
                  sandbox="allow-scripts allow-same-origin allow-pointer-lock">
          </iframe>
        </body>
        </html>
      `);
      win.document.close();
    });
  </script>
</body>
</html>
